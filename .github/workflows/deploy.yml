name: Deploy

# Deploy on every push to main. Consider gating this behind the CI workflow
# (e.g. workflow_run) once you're comfortable, so only green builds deploy.
on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # DOCR auth + Rails secret. DIGITALOCEAN_ACCESS_TOKEN and RAILS_MASTER_KEY
      # are GitHub Actions secrets; DROPLET_IP is a repository variable.
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      DROPLET_IP: ${{ vars.DROPLET_IP }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Add droplet to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DROPLET_IP" >> ~/.ssh/known_hosts

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy with Kamal
        run: bin/kamal deploy
